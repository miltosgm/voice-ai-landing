<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia - Call Now</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.4;
        }
        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: #1a1a1a;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        button:active { transform: translateY(0); }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            font-size: 0.95rem;
            color: #666;
            min-height: 24px;
        }
        .success { color: #2e7d32; font-weight: 600; }
        .error { color: #d32f2f; font-weight: 600; }
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 2rem; }
            input, button { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sofia</h1>
        <div class="subtitle">Get a call from our receptionist in 30 seconds</div>
        <input type="tel" id="phone" placeholder="Your phone number" autocomplete="tel" required>
        <button id="callBtn" onclick="callSofia()">📞 Call Me Now</button>
        <div class="status" id="status"></div>
    </div>

    <script>
const API_URL = 'https://sofia-demo.loca.lt/api/call-sofia';

async function callSofia() {
    const phone = document.getElementById('phone').value.trim();
    const btn = document.getElementById('callBtn');
    const status = document.getElementById('status');

    if (!phone) {
        status.textContent = '⚠️ Enter your phone number';
        status.className = 'error';
        return;
    }

    btn.disabled = true;
    status.textContent = '📞 Calling...';
    status.className = '';

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone_number: phone })
        });

        if (!res.ok) throw new Error('Failed');
        
        status.textContent = '✅ Sofia is calling you!';
        status.className = 'success';
        btn.textContent = '✅ Call Sent';
    } catch (err) {
        status.textContent = '❌ Error. Try again.';
        status.className = 'error';
        btn.disabled = false;
    }
}

document.getElementById('phone').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') callSofia();
});
    </script>
</body>
</html>
